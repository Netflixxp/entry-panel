<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AnyTLS SNI Entry Panel{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">SNI Entry Panel</div>
      <nav class="nav" aria-label="Main">
        <a href="/">总览</a>
        <a href="/entry-nodes">入口机</a>
        <a href="/sni-rules">SNI 规则</a>
        <a href="/site">默认网站</a>
        <a href="/backups">备份迁移</a>
        <form method="post" action="/logout">
          <button type="submit">退出登录</button>
        </form>
      </nav>
    </aside>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
